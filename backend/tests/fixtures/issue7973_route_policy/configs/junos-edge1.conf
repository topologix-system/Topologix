version 18.4R3.3;
system {
    host-name edge1;
}
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 198.51.100.1/31;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 192.0.2.1/32;
            }
        }
    }
}
routing-options {
    router-id 192.0.2.1;
    autonomous-system 65000;
}
policy-options {
    as-path Microsoft ".*8075.*";
    policy-statement EXPORT {
        term microsoft {
            from as-path Microsoft;
            then accept;
        }
        then reject;
    }
}
protocols {
    bgp {
        group EBGP {
            type external;
            peer-as 8075;
            export EXPORT;
            neighbor 198.51.100.0;
        }
    }
}
